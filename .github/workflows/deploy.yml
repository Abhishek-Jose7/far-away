name: CI/CD Deployment

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check & Build Shared Packages
        run: |
          pnpm --filter @transitiq/types build
          pnpm --filter @transitiq/shared build
          pnpm --filter @transitiq/scoring-engine build

      - name: Type Check Worker API
        run: pnpm --filter worker exec tsc --noEmit

      - name: Deploy Cloudflare Worker API
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
