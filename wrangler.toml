# wrangler.toml
# Cloudflare Worker Configuration for TransitIQ

name = "transitiq-api"
main = "apps/worker/src/index.ts"
compatibility_date = "2024-03-01"

[vars]
ENVIRONMENT = "development"

# D1 Database Bindings
[[d1_databases]]
binding = "DB"
database_name = "transitiq-dev"
database_id = "85d69e5b-459c-441e-8e1c-a04b4de72f8e"
migrations_dir = "packages/database/migrations"

# Key-Value Cache Bindings
[[kv_namespaces]]
binding = "TRANSIT_KV"
id = "7cce649487d149948c3d2e624efafeb9"

# --- Production Environment ---
[env.production]
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "transitiq-prod"
database_id = "62e7fb8c-46eb-49e8-9a01-05adfb0ebe79"
migrations_dir = "packages/database/migrations"

[[env.production.kv_namespaces]]
binding = "TRANSIT_KV"
id = "2c0a73b424b84d4cb29fdf51b2fb8046"
